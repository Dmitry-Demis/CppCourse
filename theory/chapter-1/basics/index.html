    <script>
    (function () {
        const bar = document.getElementById('reading-progress');
        if (!bar) return;
        window.addEventListener('scroll', () => {
            const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
        }, { passive: true });
    })();

    async function buildSectionsGrid() {
        const grid = document.getElementById('sections-grid');
        if (!grid) return;
        try {
            const res = await fetch('/api/course-structure');
            const data = await res.json();
            const chapter = data.chapters.find(c => c.id === 'chapter-1');
            if (!chapter) {
                grid.innerHTML = '<p style="color:var(--text-secondary)">Глава не найдена.</p>';
                return;
            }
            const paragraphs = chapter.paragraphs || [];
            if (!paragraphs.length) {
                grid.innerHTML = '<p style="color:var(--text-secondary)">Параграфы не найдены (сервер вернул пустой список).</p>';
                return;
            }

            grid.innerHTML = paragraphs.map((p, i) => {
                const href = `${p.id}.html`;
                const testCount = (p.tests || []).length;
                const testBadge = testCount > 0
                    ? `<span style="position:absolute;top:50%;right:2.5rem;transform:translateY(-50%);background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#a78bfa;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px;">? ${testCount} тест${testCount > 1 ? 'а' : ''}</span>`
                    : '';
                return `<a href="${href}" class="section-card">
                    <div class="section-card__number">§1.${i + 1}</div>
                    <div class="section-card__body">
                        <div class="section-card__title">${p.title}</div>
                    </div>
                    ${testBadge}
                    <span class="section-card__arrow">></span>
                </a>`;
            }).join('');
        } catch (e) {
            document.getElementById('sections-grid').innerHTML = '<p style="color:var(--text-secondary)">Не удалось загрузить секции: ' + e.message + '</p>';
        }
    }
    buildSectionsGrid();

    // Avg reading time — derive paragraphId from URL dynamically
    (async function loadAvgReading() {
        try {
            const parts = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
            const paragraphId = parts[parts.length - 2] || parts[parts.length - 1];
            const res = await fetch(`/api/stats/avg-reading/${paragraphId}`);
            if (!res.ok) return;
            const { avgSeconds } = await res.json();
            if (!avgSeconds) return;
            const mins = Math.floor(avgSeconds / 60);
            const secs = avgSeconds % 60;
            const label = mins > 0 ? `${mins} мин${secs > 0 ? ' ' + secs + ' сек' : ''}` : `${secs} сек`;
            const el = document.getElementById('avg-reading-time');
            if (el) { el.textContent = `? Среднее время чтения параграфа: ${label}`; el.style.display = 'block'; }
        } catch {}
    })();
    </script>
    <script src="../../../js/theme.js"></script>
